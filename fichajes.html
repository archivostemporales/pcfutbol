<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado de Fichajes</title>
    <style>
        body {
            background-color: #000;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        #game-container {
            width: 950px;
            background: linear-gradient(180deg, #005c99 0%, #003366 100%);
            border: 2px solid #5a8cb8;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.4);
            overflow: hidden;
            padding: 15px;
            position: relative;
        }

        /* --- HEADER CON ESCUDOS --- */
        header {
            background: linear-gradient(90deg, #002244 0%, #004488 50%, #002244 100%);
            border: 1px solid #7facd6;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px #000;
        }

        .escudo-header {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        .header-center h1 { margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .header-center h2 { font-size: 14px; color: #ffd700; margin: 5px 0 0 0; }

        /* --- PANELES --- */
        .panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #4a6c8a;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .label { font-size: 11px; color: #89cff0; margin-bottom: 10px; display: block; text-transform: uppercase; font-weight: bold; border-left: 3px solid #ffd700; padding-left: 8px; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }

        button {
            background: linear-gradient(180deg, #e6f0fa 0%, #a0c0e0 50%, #7090b0 51%, #a0c0e0 100%);
            border: 1px solid #fff;
            border-radius: 3px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            color: #002244;
            text-transform: uppercase;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            min-width: 120px;
        }

        button:hover { filter: brightness(1.2); }
        button:active, button.active {
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            color: #000;
            border-color: #fff;
        }

        /* --- PLANTILLA --- */
        #player-area { display: none; text-align: center; }
        .team-title-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        
        .player-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;}

        .player-card {
            background: linear-gradient(180deg, #1a3a5a 0%, #0d1f33 100%);
            border: 1px solid #5a8cb8;
            padding: 5px;
            width: 130px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .player-card:hover { border-color: #ffd700; transform: translateY(-5px); }

        .player-card img { width: 100%; height: 150px; object-fit: cover; border: 1px solid #333; }

        .player-pos { background-color: #002244; color: #ffd700; font-size: 10px; padding: 5px; margin-top: 5px; font-weight: bold; }

        /* --- MODAL --- */
        #myModal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }

        .modal-content { margin: auto; display: block; height: 75vh; border: 5px solid #5a8cb8; box-shadow: 0 0 50px #0096ff; margin-top: 30px; }
        #caption { text-align: center; color: #ffd700; padding: 15px; font-size: 22px; font-weight: bold; }
        .close { position: absolute; top: 15px; right: 35px; color: #fff; font-size: 50px; cursor: pointer; }

        #status-msg { text-align: center; color: #89cff0; font-size: 11px; margin-top: 15px; border-top: 1px solid #4a6c8a; padding-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <img id="logo-l" src="images/pcfutbol_logo.png" class="escudo-header" onerror="this.style.visibility='hidden'">
        <div class="header-center">
            <h1>SISTEMA DE SCOUTING</h1>
            <h2 id="current-selection">Esperando selección...</h2>
        </div>
        <img id="logo-r" src="" class="escudo-header" style="display:none;">
    </header>

    <div class="panel">
        <span class="label">Competición Internacional</span>
        <div class="btn-group" id="league-buttons"></div>
    </div>

    <div class="panel" id="team-panel" style="display:none;">
        <span class="label">Clubes Disponibles</span>
        <div class="btn-group" id="team-buttons"></div>
    </div>

    <div class="panel" id="player-area">
        <div class="team-title-container">
            <img id="team-escudo-small" src="" style="width: 40px; height: 40px; object-fit: contain;">
            <h2 id="team-title" style="margin: 0; font-size: 22px; color: #fff;"></h2>
        </div>
        <div class="player-grid" id="player-container"></div>
    </div>

    <div id="status-msg">SECRETARÍA TÉCNICA: Conectado.</div>
</div>

<div id="myModal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="img-grande">
  <div id="caption"></div>
</div>

<script>
    const dataFutbol = {
        "Premier League": ["Arsenal", "Chelsea", "Liverpool", "Manchester_City"],
        "Bundesliga": ["Bayern", "Borussia"],
        "Ligue 1": ["Monaco", "PSG"],
        "Serie A": ["Inter", "Juventus"],
        "Varios europeos": ["Benfica", "Galatasaray"],
        "Liga argentina": ["Boca", "River"]
    };

    const folder = "images/";
    const leagueContainer = document.getElementById('league-buttons');
    const teamContainer = document.getElementById('team-buttons');
    const playerContainer = document.getElementById('player-container');
    const modal = document.getElementById("myModal");
    const logoR = document.getElementById('logo-r');
    const smallEscudo = document.getElementById('team-escudo-small');

    // Cargar Ligas
    for (let league in dataFutbol) {
        let btn = document.createElement('button');
        btn.innerText = league;
        btn.onclick = () => {
            document.querySelectorAll('#league-buttons button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('team-panel').style.display = 'block';
            document.getElementById('player-area').style.display = 'none';
            logoR.style.display = 'none';
            
            teamContainer.innerHTML = '';
            dataFutbol[league].forEach(team => {
                let tBtn = document.createElement('button');
                tBtn.innerText = team;
                tBtn.onclick = () => showPlayers(team, tBtn);
                teamContainer.appendChild(tBtn);
            });
        };
        leagueContainer.appendChild(btn);
    }

    function showPlayers(teamName, btnElement) {
        document.querySelectorAll('#team-buttons button').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        
        let teamSlug = teamName.toLowerCase().replace(/\s+/g, '');
        let escudoSrc = folder + teamSlug + "_escudo.png";

        // Actualizar Escudos en Interfaz
        logoR.src = escudoSrc;
        logoR.style.display = 'block';
        logoR.onerror = () => logoR.style.display = 'none';
        
        smallEscudo.src = escudoSrc;
        smallEscudo.onerror = () => smallEscudo.style.display = 'none';

        document.getElementById('player-area').style.display = 'block';
        document.getElementById('team-title').innerText = teamName;
        document.getElementById('current-selection').innerText = "Informe Técnico: " + teamName;

        const positions = [
            { code: 'por', label: 'PORTERO' },
            { code: 'def', label: 'DEFENSA' },
            { code: 'medi', label: 'MEDIO IZQ' },
            { code: 'medd', label: 'MEDIO DER' },
            { code: 'del', label: 'DELANTERO' }
        ];

        playerContainer.innerHTML = '';
        positions.forEach(pos => {
            let card = document.createElement('div');
            card.className = 'player-card';
            let imgFullSrc = folder + teamSlug + "_" + pos.code + ".jpg";

            let img = document.createElement('img');
            img.src = imgFullSrc;
            img.onerror = function() { this.src = 'https://via.placeholder.com/130x150/002244/ffd700?text=SIN+FOTO'; };
            img.onclick = function(){
                modal.style.display = "block";
                document.getElementById("img-grande").src = this.src;
                document.getElementById("caption").innerText = teamName + " - " + pos.label;
            }

            card.innerHTML = `<div class="player-pos">${pos.label}</div>`;
            card.prepend(img);
            playerContainer.appendChild(card);
        });
    }

    function closeModal() { modal.style.display = "none"; }
    window.onclick = function(e) { if (e.target == modal) closeModal(); }
</script>

</body>
</html>
