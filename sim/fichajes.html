<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PC FÚTBOL 2026 - Secretaría Técnica</title>
    <style>
        :root {
            --pcf-green: #1a472a; --pcf-gold: #f1c40f; --pcf-dark: #0a1f14;
            --pcf-text: #2ecc71; --pcf-blue: #3498db; --pcf-red: #ff4d4d;
        }
        body { 
            background: #000; color: white; font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
            background-image: radial-gradient(circle, #1a472a 0%, #000 80%);
        }
        .main-menu { 
            width: 900px; background: var(--pcf-green); border: 5px solid var(--pcf-gold); 
            padding: 40px; border-radius: 15px; box-shadow: 0 0 60px rgba(0,0,0,0.9);
            text-align: center;
        }
        .header-title {
            background: var(--pcf-dark); border: 3px solid var(--pcf-gold);
            padding: 20px; margin-bottom: 40px;
        }
        .header-title h1 { margin: 0; color: var(--pcf-gold); letter-spacing: 4px; font-size: 2.5em; }
        .header-title p { margin: 5px 0 0 0; color: var(--pcf-text); font-weight: bold; }

        /* GRID DE OPCIONES */
        .menu-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;
        }
        .menu-card {
            background: var(--pcf-dark); border: 2px solid var(--pcf-gold);
            padding: 30px 15px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: white;
        }
        .menu-card:hover {
            background: #111; transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-color: white;
        }
        .icon-box {
            font-size: 4em; margin-bottom: 15px;
        }
        .card-title { font-weight: bold; font-size: 1.2em; color: var(--pcf-gold); margin-bottom: 10px; }
        .card-desc { font-size: 0.75em; color: #aaa; line-height: 1.4; }

        /* COLORES TEMÁTICOS */
        .card-ofertas:hover { border-color: var(--pcf-text); }
        .card-compra:hover { border-color: var(--pcf-blue); }
        .card-venta:hover { border-color: var(--pcf-red); }

        .btn-exit {
            background: #444; color: white; border: 2px solid #666;
            padding: 15px 40px; font-family: 'Courier New'; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-exit:hover { background: var(--pcf-red); border-color: white; }
    </style>
</head>
<body>

<div class="main-menu">
    <div class="header-title">
        <h1>SECRETARÍA TÉCNICA</h1>
        <p>GESTIÓN DE PLANTILLA Y MERCADO</p>
    </div>

    <div class="menu-grid">
        <a href="fichajes_ofertas.html" class="menu-card card-ofertas">
            <div class="icon-box">📂</div>
            <div class="card-title">OFERTAS</div>
            <div class="card-desc">Ver jugadores recomendados por los representantes hoy.</div>
        </a>

        <a href="fichajes_compra.html" class="menu-card card-compra">
            <div class="icon-box">🔍</div>
            <div class="card-title">COMPRA</div>
            <div class="card-desc">Buscador oficial. Localiza y ficha a cualquier jugador.</div>
        </a>

        <a href="fichajes_venta.html" class="menu-card card-venta">
            <div class="icon-box">💰</div>
            <div class="card-title">VENTA</div>
            <div class="card-desc">Tasación y salida de jugadores de tu plantilla.</div>
        </a>
    </div>
    <button class="btn-exit" onclick="window.location.href='../fichajes.html'">FOTOS</button>
    <button class="btn-exit" onclick="window.location.href='../menu.html'">SALIR AL MENÚ PRINCIPAL</button>
</div>

</body>
</html>
